<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST Bricks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Poppins;
  background:#111;
  color:white;
  scroll-behavior:smooth;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:100;
}

nav a{
  color:#ff7a00;
  margin:0 10px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  background:url('./bricks.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* HERO TEXT */
.hero-box{
  background:rgba(0,0,0,0.7);
  padding:40px;
  border-radius:15px;
  text-align:center;
}

.hero h1{
  font-size:40px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:12px 25px;
  background:#ff7a00;
  border-radius:30px;
  color:white;
  border:none;
}

/* PRODUCT */
.products{
  padding:50px 20px;
}

.card{
  background:#1a1a1a;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* FORM */
.form{
  padding:30px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

.total{
  color:#ff7a00;
  font-size:18px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
}

</style>
</head>

<body>

<header>
  <h3>🧱 SST Bricks</h3>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#order">Order</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div class="hero-box">
    <h1>SST Premium Bricks</h1>
    <p id="priceText">₹8 / brick</p>
    <button class="btn" onclick="scrollToOrder()">Order Now</button>
  </div>
</section>

<!-- PRODUCT -->
<section id="products" class="products">
  <div class="card">
    <img id="productImg" src="./bricks.jpg">
    <h2>Red Bricks</h2>
    <p id="priceText2">₹8 / brick</p>
  </div>
</section>

<!-- ORDER -->
<section id="order" class="form">
<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="qty" type="number" placeholder="Quantity">

<div class="total">Total: ₹<span id="total">0</span></div>

<button class="btn" onclick="sendWhatsApp()">Order via WhatsApp</button>

</section>

<footer>© SST Bricks</footer>

<script>

/* ADMIN LOAD */
let price = localStorage.getItem("price") || 8;
let img = localStorage.getItem("img") || "./bricks.jpg";

/* APPLY DATA */
document.getElementById("priceText").innerText = "₹" + price + " / brick";
document.getElementById("priceText2").innerText = "₹" + price + " / brick";
document.getElementById("productImg").src = img;
document.querySelector(".hero").style.background =
"url('" + img + "') center/cover no-repeat";

/* TOTAL CALC */
let qtyInput = document.getElementById("qty");
let totalBox = document.getElementById("total");

qtyInput.addEventListener("input", function(){
  let qty = qtyInput.value || 0;
  totalBox.innerText = qty * price;
});

/* SCROLL */
function scrollToOrder(){
  document.getElementById("order").scrollIntoView({behavior:"smooth"});
}

/* WHATSAPP */
function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let qty = document.getElementById("qty").value;
  let total = qty * price;

  if(!name || !phone || !qty){
    alert("Fill all details");
    return;
  }

  let msg =
  "SST Bricks Order\n" +
  "Name: " + name + "\n" +
  "Phone: " + phone + "\n" +
  "Quantity: " + qty + "\n" +
  "Total: ₹" + total;

  let url = "https://api.whatsapp.com/send?phone=919876543210&text=" + encodeURIComponent(msg);

  window.location.href = url;
}

</script>

</body>
</html>
