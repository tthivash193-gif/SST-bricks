<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST Bricks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Poppins;
  background:#111;
  color:white;
}

header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:100;
}

nav a{
  color:#ff7a00;
  margin:0 10px;
  text-decoration:none;
}

.hero{
  height:100vh;
  background:url('./bricks.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-box{
  background:rgba(0,0,0,0.7);
  padding:40px;
  border-radius:15px;
  text-align:center;
}

.btn{
  margin-top:15px;
  padding:12px 25px;
  background:#ff7a00;
  border-radius:30px;
  color:white;
  border:none;
}

.products{
  padding:50px 20px;
}

.card{
  background:#1a1a1a;
  border-radius:15px;
  text-align:center;
  overflow:hidden;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.form{
  padding:30px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

.total{
  color:#ff7a00;
  font-size:18px;
}

.area{
  color:#ff7a00;
  font-size:14px;
  margin:5px 0 10px 0;
}

</style>
</head>

<body>

<header>
  <h3>🧱 SST Bricks</h3>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#order">Order</a>
  </nav>
</header>

<section id="home" class="hero">
  <div class="hero-box">
    <h1>SST Premium Bricks</h1>
    <p>₹12 / brick</p>
  </div>
</section>

<section id="products" class="products">
  <div class="card">
    <img src="./bricks.jpg">
    <h2>Red Bricks</h2>
    <p>₹12 / brick</p>
  </div>
</section>

<section id="order" class="form">
<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<div class="area">
  State: Tamil Nadu
</div>

<input id="areaInput" placeholder="Enter Your Area / Street">
<input id="qty" type="number" placeholder="Quantity">

<div class="total">Total: ₹<span id="total">0</span></div>

<button class="btn" onclick="sendWhatsApp()">Order via WhatsApp</button>

</section>

<footer style="text-align:center;padding:20px;">
© SST Bricks
</footer>

<script>

const price = 12;
const MIN_QTY = 2500;

const qtyInput = document.getElementById("qty");
const totalBox = document.getElementById("total");

/* TOTAL + MIN LIMIT */
qtyInput.addEventListener("input", function(){
  let qty = parseInt(qtyInput.value) || 0;

  if(qty < MIN_QTY){
    totalBox.innerText = 0;
    return;
  }

  totalBox.innerText = qty * price;
});

/* WHATSAPP */
function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let area = document.getElementById("areaInput").value;
  let qty = parseInt(document.getElementById("qty").value) || 0;

  if(!name || !phone || !area || !qty){
    alert("Fill all details");
    return;
  }

  if(qty < MIN_QTY){
    alert("Minimum order is 2500 bricks");
    return;
  }

  let total = qty * price;

  let msg =
  "SST Bricks Order\n" +
  "Name: " + name + "\n" +
  "Phone: " + phone + "\n" +
  "State: Tamil Nadu\n" +
  "Area: " + area + "\n" +
  "Quantity: " + qty + "\n" +
  "Total: ₹" + total;

  let url = "https://api.whatsapp.com/send?phone=7305849384&text=" + encodeURIComponent(msg);

  window.location.href = url;
}

</script>

</body>
</html>
